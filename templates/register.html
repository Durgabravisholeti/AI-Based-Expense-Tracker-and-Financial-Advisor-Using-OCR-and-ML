      <div class="field">

        <label>Email Address</label>
        <div class="input-wrap">
          <i class="fa-solid fa-envelope"></i>

        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="regPassword" placeholder="Min. 6 characters" autocomplete="new-password"/>
          <button type="button" class="eye-btn" onclick="togglePw()">
            <i class="fa-solid fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button class="btn-submit" id="regBtn" onclick="doRegister()">
        <span>Create Account</span><i class="fa-solid fa-arrow-right"></i>
      </button>
      <p class="switch-link">Already have an account? <a href="/login">Sign in</a></p>

<script>
  function togglePw(){const i=document.getElementById('regPassword'),e=document.getElementById('eyeIcon');i.type==='password'?(i.type='text',e.className='fa-solid fa-eye-slash'):(i.type='password',e.className='fa-solid fa-eye');}
  function showAlert(t,c){const e=document.getElementById('msg');e.textContent=t;e.className='alert '+c;}
  async function doRegister(){
    const n=document.getElementById('regName').value.trim(),e=document.getElementById('regEmail').value.trim(),p=document.getElementById('regPassword').value;
    if(!n||!e||!p){showAlert('All fields are required','error');return;}
    if(p.length<6){showAlert('Password must be at least 6 characters','error');return;}
    const b=document.getElementById('regBtn');b.disabled=true;b.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Creating...';
    try{
      const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:n,email:e,password:p})});
      const d=await r.json();
      if(d.success){showAlert('Account created! Redirecting...','success');setTimeout(()=>window.location.href='/login',1000);}
      else{showAlert(d.message||'Registration failed','error');b.disabled=false;b.innerHTML='<span>Create Account</span><i class="fa-solid fa-arrow-right"></i>';}
    }catch{showAlert('Connection error','error');b.disabled=false;b.innerHTML='<span>Create Account</span><i class="fa-solid fa-arrow-right"></i>';}
  }
  document.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister();});
</script>
<script>
(function(){
  var rob=document.getElementById('robot2');
  var le=document.getElementById('leye2');
  var re=document.getElementById('reye2');
  var c1=document.getElementById('rc1');
  var c2=document.getElementById('rc2');
  var s1=document.getElementById('rs1');
  var s2=document.getElementById('rs2p');
  var t=0;
  function tick(){
    t+=0.016;
    if(rob) rob.setAttribute('transform','translate(0,'+Math.sin(t*1.2)*18+')');
    var ep=0.55+0.45*Math.abs(Math.sin(t*1.8));
    if(le) le.setAttribute('opacity',ep);
    if(re) re.setAttribute('opacity',ep);
    if(c1) c1.setAttribute('transform','translate(0,'+Math.sin(t*1.1)*16+')');
    if(c2) c2.setAttribute('transform','translate(0,'+Math.sin(t*0.9+1)*14+')');
    if(s1) s1.setAttribute('opacity',0.2+0.8*Math.abs(Math.sin(t*1.5)));
    if(s2) s2.setAttribute('opacity',0.2+0.8*Math.abs(Math.sin(t*1.2+1)));
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>
