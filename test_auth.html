<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Authentication</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .message { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .section { margin: 30px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>🧪 Authentication Test Page</h1>
    
    <div class="section">
        <h2>📝 Register New Account</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="regUsername">Username:</label>
                <input type="text" id="regUsername" required>
            </div>
            <div class="form-group">
                <label for="regEmail">Email:</label>
                <input type="email" id="regEmail" required>
            </div>
            <div class="form-group">
                <label for="regPassword">Password:</label>
                <input type="password" id="regPassword" required>
            </div>
            <button type="submit">Register</button>
        </form>
        <div id="registerMessage"></div>
    </div>

    <div class="section">
        <h2>🔐 Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email:</label>
                <input type="email" id="loginEmail" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password:</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit">Login</button>
        </form>
        <div id="loginMessage"></div>
    </div>

    <div class="section">
        <h2>📊 Test Results</h2>
        <div id="testResults">
            <p>Use the forms above to test registration and login functionality.</p>
        </div>
    </div>

    <script>
        function showMessage(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="message ${type}">${message}</div>`;
        }

        // Register form
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('registerMessage', 'Registration successful! You can now login.', 'success');
                    document.getElementById('registerForm').reset();
                    
                    // Pre-fill login form
                    document.getElementById('loginEmail').value = email;
                } else {
                    showMessage('registerMessage', data.message || 'Registration failed', 'error');
                }
            } catch (error) {
                showMessage('registerMessage', 'Network error: ' + error.message, 'error');
            }
        });

        // Login form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('loginMessage', 'Login successful! Redirecting to dashboard...', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showMessage('loginMessage', data.message || 'Login failed', 'error');
                }
            } catch (error) {
                showMessage('loginMessage', 'Network error: ' + error.message, 'error');
            }
        });

        // Test API endpoints
        async function testEndpoints() {
            const results = document.getElementById('testResults');
            results.innerHTML = '<p>Testing API endpoints...</p>';
            
            const tests = [];
            
            // Test if server is running
            try {
                const response = await fetch('/');
                tests.push(`✅ Server is running (status: ${response.status})`);
            } catch (error) {
                tests.push(`❌ Server connection failed: ${error.message}`);
            }

            // Test registration endpoint
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({}) // Empty body to test validation
                });
                const data = await response.json();
                tests.push(`✅ Registration endpoint responds (validation: ${data.message})`);
            } catch (error) {
                tests.push(`❌ Registration endpoint failed: ${error.message}`);
            }

            // Test login endpoint
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({}) // Empty body to test validation
                });
                const data = await response.json();
                tests.push(`✅ Login endpoint responds (validation: ${data.message})`);
            } catch (error) {
                tests.push(`❌ Login endpoint failed: ${error.message}`);
            }

            results.innerHTML = `
                <h3>API Test Results:</h3>
                <ul>
                    ${tests.map(test => `<li>${test}</li>`).join('')}
                </ul>
            `;
        }

        // Run tests on page load
        window.addEventListener('load', testEndpoints);
    </script>
</body>
</html>
